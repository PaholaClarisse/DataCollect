
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Formulaire</title>
</head>
<body>

    <h1 id="form-title">Chargement...</h1>
    <p id="form-description"></p>
    <div id="champs-container"></div>
    <button onclick="soumettre()">Envoyer</button>

    <script>
        const formulaireId = "{{ formulaire_id }}"
        const token = localStorage.getItem('token')
        if (!token) window.location.href = '/'

        async function loadFormulaire() {
            const response = await fetch(`/formulaires/${formulaireId}/public`, {
                headers: {'Authorization': `Bearer ${token}`}
            })
            const data = await response.json()

            document.getElementById('form-title').textContent = data.title
            document.getElementById('form-description').textContent = data.description || ''

            const container = document.getElementById('champs-container')
            container.innerHTML = data.champs.map((champ, index) => `
                <div>
                    <label>${champ.label} ${champ.obligatoire ? '*' : ''}</label>
                    ${genererChamp(champ, index)}
                </div>
            `).join('')
        }

        function genererChamp(champ, index) {
            switch(champ.type_champ) {
                case 'texte':
                    return `<input type="text" id="champ-${index}" placeholder="${champ.placeholder || ''}">`
                case 'nombre':
                    return `<input type="number" id="champ-${index}">`
                case 'email':
                    return `<input type="email" id="champ-${index}">`
                case 'date':
                    return `<input type="date" id="champ-${index}">`
                case 'zone_texte':
                    return `<textarea id="champ-${index}"></textarea>`
                case 'choix_unique':
                    return champ.options.map(opt => `
                        <label>
                            <input type="radio" name="champ-${index}" value="${opt}"> ${opt}
                        </label>
                    `).join('')
                case 'choix_multiple':
                    return champ.options.map(opt => `
                        <label>
                            <input type="checkbox" id="champ-${index}-${opt}" value="${opt}"> ${opt}
                        </label>
                    `).join('')
                default:
                    return `<input type="text" id="champ-${index}">`
            }
        }

        async function soumettre() {
            const container = document.getElementById('champs-container')
            const donnees = {}
            const divs = container.querySelectorAll('div')

            divs.forEach((div, index) => {
                const label = div.querySelector('label').textContent.replace(' *', '').trim()
                const input = div.querySelector('input, textarea, select')
                if (input) {
                    if (input.type === 'radio') {
                        const checked = div.querySelector('input:checked')
                        if (checked) donnees[label] = checked.value
                    } else if (input.type === 'checkbox') {
                        const checked = div.querySelectorAll('input:checked')
                        donnees[label] = Array.from(checked).map(c => c.value)
                    } else {
                        donnees[label] = input.value
                    }
                }
            })

            const response = await fetch(`/formulaires/${formulaireId}/reponses`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({donnees})
            })

            if (response.ok) {
                alert('Réponse envoyée avec succès !')
                window.location.href = '/'
            } else {
                const data = await response.json()
                alert(data.detail)
            }
        }

        loadFormulaire()
    </script>

</body>
</html>
