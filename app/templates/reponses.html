<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Réponses</title>
</head>
<body>

    <h1>Réponses du formulaire</h1>
    <a href="/dashboard">← Retour</a>
    <button onclick="exportCSV()">📥 Exporter CSV</button>

    <div id="reponses-container">
        Chargement...
    </div>

    <script>
        const formulaireId = "{{ formulaire_id }}"
        const token = localStorage.getItem('token')
        if (!token) window.location.href = '/'

async function loadReponses() {
    const response = await fetch(`/formulaires/${formulaireId}/reponses`, {
        headers: {'Authorization': `Bearer ${token}`}
    })
    const data = await response.json()
    const container = document.getElementById('reponses-container')

    if (data.length === 0) {
        container.innerHTML = '<p>Aucune réponse</p>'
        return
    }

    // Créer le tableau
    const headers = Object.keys(data[0].donnees)
    container.innerHTML = `
        <table border="1">
            <tr>
                <th>Répondant</th>
                ${headers.map(h => `<th>${h}</th>`).join('')}
                <th>Date</th>
            </tr>
            ${data.map(r => `
                <tr>
                    <td>${r.repondant.name}</td>
                    ${headers.map(h => `<td>${r.donnees[h] || ''}</td>`).join('')}
                    <td>${new Date(r.date_soumission).toLocaleDateString()}</td>
                </tr>
            `).join('')}
        </table>
    `
}

function exportCSV() {
    window.location.href = `/formulaires/${formulaireId}/export?token=${token}`
}

loadReponses()
    </script>

</body>
</html>
